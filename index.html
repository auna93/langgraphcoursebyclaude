<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curso interactivo de LangGraph</title>
    <script>
      // Aplica el tema ANTES de pintar para evitar el parpadeo (FOUC).
      // Fuente de verdad: localStorage "lgcourse.theme"; si no existe, el tema del sistema.
      (function () {
        try {
          var t = localStorage.getItem("lgcourse.theme");
          var dark =
            t === "dark" ||
            (t === null &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage inaccesible: se queda en claro */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
